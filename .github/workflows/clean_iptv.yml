name: 酒店源深度清洗与测试

on:
  schedule:
    - cron: '0 21 * * *' # UTC 21:00 (北京时间 05:00)
  workflow_dispatch: 

jobs:
  clean_and_test:
    runs-on: ubuntu-latest
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: pip install requests

    - name: 步骤 1 - 运行原始转换 (convert.py)
      run: python -u py/convert.py

    - name: 步骤 2 - 深度清洗非酒店源并测速 (clean_hotel.py)
      run: python -u py/clean_hotel.py

    - name: 提交并推送纯净版
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add py/hotel_only.m3u
        if git diff --staged --quiet; then
          echo "内容无变化"
        else
          git commit -m "自动清理: 仅保留存活酒店源 $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi
