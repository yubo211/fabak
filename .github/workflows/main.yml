name: IPTV Auto Update

on:
  schedule:
    - cron: '0 18 * * *' # 每天北京时间凌晨 2:00 运行 (UTC 18:00)
  workflow_dispatch:      # 支持手动点击运行

jobs:
  update_list:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装 FFmpeg
      run: sudo apt-get update && sudo apt-get install -y ffmpeg

    - name: 安装 Python 依赖
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # 如果没有 requirements.txt，可以在下面手动加需要的库
        pip install requests requests-html

    - name: 运行扫描脚本 (scan.py)
      env:
        FOFA_EMAIL: ${{ secrets.FOFA_EMAIL }} # 如果需要 API Key，存放在 Settings->Secrets
        FOFA_KEY: ${{ secrets.FOFA_KEY }}
      run: python py/scan.py

    - name: 运行转换与去重脚本 (convert.py)
      run: python py/convert.py

    - name: 提交并推送更改
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add .
        git commit -m "Auto Update: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
        git push
