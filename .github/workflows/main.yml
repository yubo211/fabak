name: IPTV 酒店源自动扫描与转换

on:
  schedule:
    - cron: '0 20 * * *' 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120 

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # 移除了 cache: 'pip'，因为你没有 requirements.txt

    - name: 安装必要依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 确保目录存在
      run: |
        mkdir -p py/iptv_results

    - name: 执行扫描脚本 (scan.py)
      run: |
        # 确保 1000.txt 存在，如果不存在则创建一个空的防止报错
        touch py/1000.txt
        python -u py/scan.py

    - name: 执行转换补全脚本 (convert.py)
      run: |
        python -u py/convert.py

    - name: 提交并推送结果
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add py/
        # 检查是否有文件变动，防止空提交报错
        if git diff --staged --quiet; then
          echo "没有检测到任何文件变动，跳过推送。"
        else
          git commit -m "自动更新: $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi
