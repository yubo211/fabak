name: IPTV Traffic Speed Test

on:
  schedule:
    # 每 3 天的中午 12 点运行一次 (UTC)
    - cron: '0 12 */3 * *'
  workflow_dispatch: # 支持手动点击按钮运行

jobs:
  test_speed:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/checkout@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Traffic Test Script
        run: |
          # 确保脚本路径正确，假设你的脚本名叫 traffic_test.py
          python py/traffic_test.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Commit and Push Reports
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 检查是否有文件变化，避免空提交
          git add py/traffic_report.txt py/traffic_summary.json
          if git diff --staged --quiet; then
            echo "No changes in reports. Skipping commit."
          else
            git commit -m "Update IPTV Traffic Report $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
