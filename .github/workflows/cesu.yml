name: IPTV Traffic Speed Test

on:
  schedule:
    - cron: '0 12 */3 * *'
  workflow_dispatch:

jobs:
  test_speed:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5  # 注意这里必须是 setup-python
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Traffic Test Script
        run: |
          # 运行前先确认文件是否存在
          ls -R py/
          python py/traffic_test.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Commit and Push Reports
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 只有文件存在时才执行提交，防止报错
          if [ -f "py/traffic_report.txt" ]; then
            git add py/traffic_report.txt py/traffic_summary.json
            git commit -m "Update IPTV Traffic Report $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
            git push
          else
            echo "Report files not found, skipping git push."
          fi
