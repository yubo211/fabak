name: IPTV Traffic Speed Test

on:
  schedule:
    - cron: '0 12 */3 * *'
  workflow_dispatch:

jobs:
  test_speed:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Traffic Test
        run: |
          # 运行测速脚本
          python py/traffic_test.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Commit and Push Results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 检查文件是否存在并提交
          if [ -f "py/traffic_report.txt" ]; then
            git add py/traffic_report.txt py/traffic_summary.json
            git commit -m "Update IPTV Traffic Report $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
            git push
          else
            echo "Error: Report files were not generated."
            exit 1
          fi
